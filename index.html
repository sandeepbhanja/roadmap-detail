<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineer Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d;
  --bg2: #0e1017;
  --bg3: #151820;
  --bg4: #1c2030;
  --border: #2a2f45;
  --border2: #3a4060;
  --cyan: #00f5ff;
  --cyan2: #00b8cc;
  --purple: #a855f7;
  --purple2: #7c3aed;
  --green: #10b981;
  --green2: #059669;
  --orange: #f97316;
  --orange2: #ea580c;
  --gold: #fbbf24;
  --gold2: #d97706;
  --red: #ef4444;
  --pink: #ec4899;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --p1: #3b82f6;
  --p1b: #1d4ed8;
  --p2: #10b981;
  --p2b: #059669;
  --agent: #a855f7;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px);
  pointer-events: none; z-index: 9999;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,9,13,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  padding: 0 24px;
  display: flex; align-items: center; gap: 20px;
  height: 64px;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 16px; font-weight: 900;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,245,255,0.5);
  letter-spacing: 2px;
  white-space: nowrap;
}

.header-xp {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-family: 'Orbitron', monospace; font-size: 11px;
}
.xp-val { color: var(--gold); font-weight: 700; }

.header-stats {
  display: flex; gap: 10px; margin-left: auto;
}
.hstat {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px;
}
.hstat-num { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 13px; }

.streak { color: var(--orange); }
.total-done { color: var(--green); }
.level-badge {
  font-family: 'Orbitron', monospace;
  background: linear-gradient(135deg, var(--purple), var(--cyan2));
  border-radius: 8px; padding: 5px 12px;
  font-size: 12px; font-weight: 700;
  box-shadow: 0 0 15px rgba(168,85,247,0.3);
}

/* ── MAIN XP BAR ── */
.xp-bar-container {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
}
.xp-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
.xp-track { height: 8px; background: var(--bg4); border-radius: 4px; overflow: visible; position: relative; }
.xp-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--purple2), var(--cyan));
  box-shadow: 0 0 12px var(--cyan2);
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.xp-fill::after {
  content: '';
  position: absolute; right: -1px; top: -3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan2);
}

/* ── TABS ── */
.tabs {
  display: flex; gap: 0;
  padding: 16px 24px 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.tab {
  font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 10px 20px; cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  color: var(--text3);
  background: transparent;
  transition: all 0.2s;
  position: relative; top: 1px;
}
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active {
  color: var(--cyan); background: var(--bg);
  border-color: var(--border);
  border-bottom-color: var(--bg);
  text-shadow: 0 0 10px rgba(0,245,255,0.4);
}
.tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }

/* ── CONTENT ── */
.content { padding: 24px; max-width: 1400px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── WEEK FILTERS ── */
.week-filters {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 20px; align-items: center;
}
.week-filters-label { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; margin-right: 4px; }
.wf-btn {
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 600;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text3);
  transition: all 0.15s;
}
.wf-btn:hover { border-color: var(--cyan2); color: var(--cyan); }
.wf-btn.active { background: var(--bg4); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 8px rgba(0,245,255,0.2); }
.wf-btn.all { border-color: var(--purple); color: var(--purple); }
.wf-btn.all.active { background: rgba(168,85,247,0.15); box-shadow: 0 0 8px rgba(168,85,247,0.3); }
.filter-group { display: flex; gap: 6px; align-items: center; }
.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

/* ── MILESTONE SECTION ── */
.milestone-group { margin-bottom: 16px; }
.milestone-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px 10px 0 0; cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.milestone-header:hover { border-color: var(--border2); background: var(--bg3); }
.milestone-header.p1 { border-left: 3px solid var(--p1); }
.milestone-header.p2 { border-left: 3px solid var(--p2); }
.milestone-header.agent { border-left: 3px solid var(--agent); }
.milestone-header.sd { border-left: 3px solid var(--cyan); }

.milestone-icon { font-size: 18px; }
.milestone-title { font-weight: 600; font-size: 14px; flex: 1; }
.milestone-meta { display: flex; gap: 8px; align-items: center; }
.m-badge {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  padding: 2px 8px; border-radius: 4px; font-weight: 500;
}
.m-badge.p1 { background: rgba(59,130,246,0.2); color: var(--p1); border: 1px solid rgba(59,130,246,0.3); }
.m-badge.p2 { background: rgba(16,185,129,0.2); color: var(--p2); border: 1px solid rgba(16,185,129,0.3); }
.m-badge.agent { background: rgba(168,85,247,0.2); color: var(--agent); border: 1px solid rgba(168,85,247,0.3); }
.m-badge.sd { background: rgba(0,245,255,0.1); color: var(--cyan); border: 1px solid rgba(0,245,255,0.3); }
.m-badge.wk { background: rgba(251,191,36,0.1); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); }

.milestone-progress-ring { position: relative; width: 36px; height: 36px; flex-shrink: 0; }
.milestone-progress-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--bg4); stroke-width: 3; }
.ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; font-family: 'Orbitron', monospace; font-weight: 700; }

.chevron { font-size: 12px; color: var(--text3); transition: transform 0.3s; }
.milestone-header.collapsed .chevron { transform: rotate(-90deg); }

.milestone-tasks { border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
.milestone-header.collapsed + .milestone-tasks { display: none; }

/* ── TASK CARD ── */
.task-card {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 0; align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  transition: background 0.15s;
  min-height: 60px;
}
.task-card:last-child { border-bottom: none; }
.task-card:hover { background: var(--bg3); }
.task-card.done { background: rgba(16,185,129,0.04); }
.task-card.done .task-main-text { color: var(--text3); text-decoration: line-through; text-decoration-color: rgba(100,116,139,0.5); }
.task-card.weekend { background: rgba(249,115,22,0.04); }
.task-card.agent-task { background: rgba(168,85,247,0.04); }

.task-check-col {
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-right: 1px solid var(--border);
  transition: background 0.15s;
}
.task-check-col:hover { background: rgba(16,185,129,0.1); }

.task-checkbox {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-size: 11px; cursor: pointer;
}
.task-checkbox.checked {
  background: var(--green); border-color: var(--green);
  box-shadow: 0 0 10px rgba(16,185,129,0.5);
}

.task-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
.task-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.day-tag {
  font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.day-tag.wd { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); }
.day-tag.wkd { background: rgba(249,115,22,0.15); color: #fdba74; border: 1px solid rgba(249,115,22,0.2); }
.task-main-text { font-size: 13px; line-height: 1.45; color: var(--text); }
.task-sub { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
.task-deliverable { font-size: 11px; color: var(--cyan2); font-family: 'JetBrains Mono', monospace; }
.task-deliverable::before { content: '→ '; opacity: 0.6; }
.tech-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: var(--bg4); color: var(--text3); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}
.yt-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2);
  font-family: 'JetBrains Mono', monospace;
}
.yt-tag::before { content: '▶ '; }
.notes-preview { font-size: 11px; color: var(--text3); font-style: italic; }
.notes-preview::before { content: '📝 '; }

.task-xp-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 12px; gap: 3px; border-left: 1px solid var(--border);
  min-width: 60px;
}
.xp-chip {
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
  color: var(--gold); white-space: nowrap;
}
.xp-chip.earned { color: var(--text3); text-decoration: line-through; }

/* ── PHASE CARDS (SD) ── */
.phase-banner {
  background: linear-gradient(135deg, var(--bg3), var(--bg4));
  border: 1px solid var(--border);
  border-left: 4px solid var(--cyan);
  border-radius: 10px; padding: 14px 18px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
}
.phase-num { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: var(--cyan); opacity: 0.4; }
.phase-info h3 { font-size: 15px; font-weight: 600; }
.phase-info p { font-size: 12px; color: var(--text3); margin-top: 2px; }
.phase-prog { margin-left: auto; text-align: right; }
.phase-prog-num { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700; color: var(--cyan); }
.phase-prog-label { font-size: 10px; color: var(--text3); }

/* ── OVERVIEW GRID ── */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.blue::before { background: linear-gradient(90deg, var(--p1), transparent); }
.stat-card.green::before { background: linear-gradient(90deg, var(--p2), transparent); }
.stat-card.purple::before { background: linear-gradient(90deg, var(--agent), transparent); }
.stat-card.cyan::before { background: linear-gradient(90deg, var(--cyan), transparent); }
.stat-card.gold::before { background: linear-gradient(90deg, var(--gold), transparent); }

.stat-icon { font-size: 28px; margin-bottom: 10px; }
.stat-num { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900; line-height: 1; }
.stat-num.blue { color: var(--p1); }
.stat-num.green { color: var(--p2); }
.stat-num.purple { color: var(--agent); }
.stat-num.cyan { color: var(--cyan); }
.stat-num.gold { color: var(--gold); }
.stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
.stat-bar { height: 4px; background: var(--bg4); border-radius: 2px; margin-top: 12px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

/* ── ACHIEVEMENT POPUP ── */
.achievement-popup {
  position: fixed; bottom: 24px; right: 24px; z-index: 9998;
  background: linear-gradient(135deg, rgba(14,16,23,0.98), rgba(28,32,48,0.98));
  border: 1px solid var(--gold);
  border-radius: 14px; padding: 16px 20px;
  display: flex; gap: 14px; align-items: center;
  box-shadow: 0 0 30px rgba(251,191,36,0.3), 0 20px 40px rgba(0,0,0,0.5);
  transform: translateX(120%); opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  max-width: 340px;
}
.achievement-popup.show { transform: translateX(0); opacity: 1; }
.ach-icon { font-size: 36px; }
.ach-title { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--gold); letter-spacing: 1px; }
.ach-name { font-size: 14px; font-weight: 600; margin-top: 2px; }
.ach-xp { font-family: 'Orbitron', monospace; font-size: 12px; color: var(--gold); margin-top: 4px; }

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; pointer-events: none; z-index: 9997;
  width: 8px; height: 8px; border-radius: 2px;
  animation: confetti-fall 1.5s ease-in forwards;
}
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── XP FLOAT ── */
.xp-float {
  position: fixed; pointer-events: none; z-index: 9996;
  font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
  color: var(--gold); text-shadow: 0 0 10px var(--gold);
  animation: xp-rise 1.2s ease-out forwards;
}
@keyframes xp-rise {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
}

/* ── LEVEL UP ── */
.levelup-overlay {
  position: fixed; inset: 0; z-index: 9995;
  background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.levelup-overlay.show { opacity: 1; pointer-events: all; }
.levelup-box {
  text-align: center;
  animation: levelup-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes levelup-pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.lu-icon { font-size: 80px; filter: drop-shadow(0 0 20px gold); }
.lu-title { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 3px; color: var(--gold); margin-top: 10px; }
.lu-level { font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px gold, 0 0 60px gold; line-height: 1; }
.lu-sub { font-size: 16px; color: var(--text2); margin-top: 8px; }
.lu-dismiss { margin-top: 24px; padding: 10px 28px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: 'Orbitron', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.lu-dismiss:hover { background: rgba(251,191,36,0.1); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan2); }

/* ── WEEK HEADER ── */
.week-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 10px;
}
.week-num {
  font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
  color: var(--text3); letter-spacing: 2px; white-space: nowrap;
}
.week-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
.week-badge {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3);
}

/* Project toggle */
.proj-filter { display: flex; gap: 8px; margin-bottom: 16px; }
.proj-btn {
  padding: 6px 14px; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 600; border: 1px solid;
  transition: all 0.2s; font-family: 'Space Grotesk', sans-serif;
}
.proj-btn.p1 { border-color: var(--p1); color: var(--p1); background: transparent; }
.proj-btn.p1.active { background: rgba(59,130,246,0.15); box-shadow: 0 0 10px rgba(59,130,246,0.2); }
.proj-btn.p2 { border-color: var(--p2); color: var(--p2); background: transparent; }
.proj-btn.p2.active { background: rgba(16,185,129,0.15); box-shadow: 0 0 10px rgba(16,185,129,0.2); }
.proj-btn.all { border-color: var(--border2); color: var(--text2); background: transparent; }
.proj-btn.all.active { background: var(--bg3); }

/* empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* progress ring colors */
.ring-fill.p1 { stroke: var(--p1); }
.ring-fill.p2 { stroke: var(--p2); }
.ring-fill.agent { stroke: var(--agent); }
.ring-fill.sd { stroke: var(--cyan); }
.ring-fill.done { stroke: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ AI ENGINEER QUEST</div>
  <div class="header-xp">
    <span style="color:var(--text3);font-size:10px">XP</span>
    <span class="xp-val" id="hdr-xp">0</span>
  </div>
  <div class="header-stats">
    <div class="hstat"><span>🔥</span><span class="hstat-num streak" id="hdr-streak">0</span><span style="font-size:10px;color:var(--text3)">streak</span></div>
    <div class="hstat"><span>✅</span><span class="hstat-num total-done" id="hdr-done">0</span><span style="font-size:10px;color:var(--text3)">done</span></div>
    <div class="level-badge" id="hdr-level">LVL 1</div>
  </div>
</div>

<div class="xp-bar-container">
  <div class="xp-label">
    <span id="xp-label-left">0 XP</span>
    <span id="xp-label-right">Next level: 500 XP</span>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="overview">
    <span class="tab-dot" style="background:var(--gold)"></span>OVERVIEW
  </div>
  <div class="tab" data-tab="projects">
    <span class="tab-dot" style="background:var(--p1)"></span>PROJECTS
  </div>
  <div class="tab" data-tab="sysdesign">
    <span class="tab-dot" style="background:var(--cyan)"></span>SYS DESIGN
  </div>
</div>

<div class="content">

  <!-- ── OVERVIEW ── -->
  <div class="tab-panel active" id="panel-overview">
    <div class="overview-grid" id="overview-grid"></div>

// ══ GAME STATE ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'aiengineerquest_v1';
let state = {
  done: {},       // taskId → true
  xp: 0,
  level: 1,
  streak: 0,
  lastDoneDate: null,
  achievements: {}
};

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const p = JSON.parse(s); Object.assign(state, p); }
  } catch(e) {}
}

// XP per task type
const XP = { wd: 25, wkd: 75, agent: 50, sd_wd: 20, sd_wkd: 60 };

function getTaskXP(task, isSd) {
  if (isSd) return task.fmt && task.fmt.includes('Weekend') ? XP.sd_wkd : XP.sd_wd;
  let base = task.isWeekend ? XP.wkd : XP.wd;
  if (task.isAgent) base += 25;
  return base;
}

function taskId(task, isSd) {
  if (isSd) return `sd_${task.week}_${task.concept.slice(0,30)}`;
  return `pr_${task.week}_${task.day}_${task.task.slice(0,30)}`;
}

// ══ LEVELS ════════════════════════════════════════════════════════════════════
const LEVELS = [
  {lvl:1, xp:0, title:'Apprentice', icon:'🌱'},
  {lvl:2, xp:500, title:'Initiate', icon:'⚡'},
  {lvl:3, xp:1500, title:'Builder', icon:'🔧'},
  {lvl:4, xp:3000, title:'Engineer', icon:'💻'},
  {lvl:5, xp:5500, title:'Architect', icon:'🏗️'},
  {lvl:6, xp:9000, title:'Specialist', icon:'🎯'},
  {lvl:7, xp:14000, title:'Expert', icon:'🧠'},
  {lvl:8, xp:20000, title:'Master', icon:'🔮'},
  {lvl:9, xp:28000, title:'Elite', icon:'⚔️'},
  {lvl:10, xp:38000, title:'Legend', icon:'🌟'},
];

function getCurrentLevel() {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (state.xp >= l.xp) cur = l; }
  return cur;
}
function getNextLevel() {
  const cur = getCurrentLevel();
  return LEVELS.find(l => l.xp > cur.xp) || null;
}

// ══ ACHIEVEMENTS ══════════════════════════════════════════════════════════════
const ACHIEVEMENTS = [
  {id:'first', name:'First Blood', icon:'⚔️', desc:'Complete your first task', check: s => Object.keys(s.done).length >= 1, xp:50},
  {id:'streak3', name:'On a Roll', icon:'🔥', desc:'3 day streak', check: s => s.streak >= 3, xp:100},
  {id:'week1', name:'Week Warrior', icon:'📅', desc:'Complete all tasks in Week 1', check: s => checkWeekDone(s,1,'pr'), xp:200},

  {id:'agent_first', name:'Agent Online', icon:'🤖', desc:'Complete your first agent task', check: s => Object.keys(s.done).some(k=>{const t=PR_DATA.find(p=>taskId(p,false)===k); return t&&t.isAgent;}), xp:150},
  {id:'half_done', name:'Halfway There', icon:'💪', desc:'Complete 50% of all tasks', check: s => getDonePct(s)>=50, xp:500},
  {id:'all_done', name:'AI Engineer', icon:'🌟', desc:'Complete ALL tasks', check: s => getDonePct(s)>=100, xp:2000},
  {id:'weekend10', name:'Weekend Warrior', icon:'🏋️', desc:'Complete 10 weekend tasks', check: s => Object.keys(s.done).filter(k=>{const t=PR_DATA.find(p=>taskId(p,false)===k); return t&&t.isWeekend;}).length>=10, xp:200},
  {id:'p1_done', name:'Incident Resolved', icon:'🔵', desc:'Complete all P1 tasks', check: s => PR_DATA.filter(t=>t.project==='Incident Intelligence').every(t=>s.done[taskId(t,false)]), xp:1000},
  {id:'p2_done', name:'Price Optimized', icon:'🟢', desc:'Complete all P2 tasks', check: s => PR_DATA.filter(t=>t.project==='Dynamic Pricing Engine').every(t=>s.done[taskId(t,false)]), xp:1000},
];

function checkWeekDone(s, week, type) {
  if (type==='pr') { const tasks=PR_DATA.filter(t=>t.week===week); return tasks.length>0 && tasks.every(t=>s.done[taskId(t,false)]); }
  return false;
}
function getDonePct(s) {
  const total = SD_DATA.length + PR_DATA.length;
  return Math.round(Object.keys(s.done).length/total*100);
}

function checkAchievements(newlyDoneId) {
  for (const a of ACHIEVEMENTS) {
    if (!state.achievements[a.id] && a.check(state)) {
      state.achievements[a.id] = true;
      state.xp += a.xp;
      showAchievement(a);
    }
  }
}

// ══ UI HELPERS ════════════════════════════════════════════════════════════════
function showAchievement(a) {
  const popup = document.getElementById('ach-popup');
  document.getElementById('ach-icon').textContent = a.icon;
  document.getElementById('ach-name').textContent = a.name;
  document.getElementById('ach-xp').textContent = '+' + a.xp + ' XP — ' + a.desc;
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 4000);
}

function showXpFloat(xp, el) {
  const rect = el.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'xp-float';
  div.textContent = '+' + xp + ' XP';
  div.style.left = (rect.left + rect.width/2 - 20) + 'px';
  div.style.top = (rect.top - 10 + window.scrollY) + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1200);
}

function spawnConfetti(x, y) {
  const colors = ['#00f5ff','#a855f7','#10b981','#fbbf24','#f97316','#ec4899'];
  for (let i=0; i<18; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = (x + (Math.random()-0.5)*60) + 'px';
    c.style.top = y + 'px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = Math.random()*0.3 + 's';
    c.style.animationDuration = (1+Math.random()*0.8) + 's';
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

function showLevelUp(lvl) {
  document.getElementById('lu-num').textContent = lvl.icon + ' ' + lvl.lvl;
  document.getElementById('lu-sub').textContent = lvl.title;
  document.getElementById('lu-overlay').classList.add('show');
}
function closeLevelUp() { document.getElementById('lu-overlay').classList.remove('show'); }

// ══ TOGGLE TASK ════════════════════════════════════════════════════════════════
function toggleTask(id, xpVal, checkEl, cardEl, isSd) {
  const wasDone = !!state.done[id];
  const oldLevel = getCurrentLevel().lvl;

  if (wasDone) {
    delete state.done[id];
    state.xp = Math.max(0, state.xp - xpVal);
  } else {
    state.done[id] = true;
    state.xp += xpVal;
    const rect = checkEl.getBoundingClientRect();
    spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2 + window.scrollY);
    showXpFloat(xpVal, checkEl);
    checkAchievements(id);
  }

  // update checkbox
  checkEl.textContent = wasDone ? '' : '✓';
  checkEl.classList.toggle('checked', !wasDone);
  cardEl.classList.toggle('done', !wasDone);

  // check level up
  const newLevel = getCurrentLevel().lvl;
  if (newLevel > oldLevel) showLevelUp(getCurrentLevel());

  updateHUD();
  saveState();
  refreshProgressRings();
  refreshOverview();
}

// ══ HUD ════════════════════════════════════════════════════════════════════════
function updateHUD() {
  const xp = state.xp;
  const cur = getCurrentLevel();
  const next = getNextLevel();
  document.getElementById('hdr-xp').textContent = xp.toLocaleString();
  document.getElementById('hdr-level').textContent = cur.icon + ' LVL ' + cur.lvl;
  document.getElementById('hdr-done').textContent = Object.keys(state.done).length;

  const xpInLevel = next ? xp - cur.xp : 0;
  const xpNeeded = next ? next.xp - cur.xp : 1;
  const pct = next ? Math.min(100, Math.round(xpInLevel/xpNeeded*100)) : 100;
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-label-left').textContent = xp.toLocaleString() + ' XP — ' + cur.title;
  document.getElementById('xp-label-right').textContent = next ? 'Next: ' + next.xp.toLocaleString() + ' XP (' + next.title + ')' : 'MAX LEVEL';
}

// ══ PROGRESS RING SVG ═════════════════════════════════════════════════════════
function makeRing(done, total, cls) {
  const pct = total > 0 ? done/total : 0;
  const r = 14; const circ = 2*Math.PI*r;
  const dash = circ; const offset = circ*(1-pct);
  const ringClass = pct===1 ? 'done' : cls;
  return `<svg width="36" height="36" viewBox="0 0 36 36">
    <circle class="ring-bg" cx="18" cy="18" r="${r}"/>
    <circle class="ring-fill ${ringClass}" cx="18" cy="18" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset.toFixed(2)}"/>
  </svg>
  <div class="ring-text" style="color:${pct===1?'var(--green)':'var(--text2)'}">${Math.round(pct*100)}%</div>`;
}

function refreshProgressRings() {
  document.querySelectorAll('[data-ring]').forEach(el => {
    const [type, key] = el.dataset.ring.split('|');
    let done=0, total=0, cls='';
    if (type==='milestone') {
      const [proj, milestone] = key.split('~~');
      const tasks = PR_DATA.filter(t => t.project===proj && t.milestone===milestone);
      total = tasks.length;
      done = tasks.filter(t => state.done[taskId(t,false)]).length;
      cls = proj==='Incident Intelligence' ? (milestone.includes('[AGENT]')?'agent':'p1') : (milestone.includes('[AGENT]')?'agent':'p2');
    } else if (type==='sdphase') {
      const tasks = SD_DATA.filter(t => t.phase===key);
      total = tasks.length;
      done = tasks.filter(t => state.done[taskId(t,true)]).length;
      cls = 'sd';
    } else if (type==='week') {
      const [proj, week] = key.split('|');
      const tasks = PR_DATA.filter(t => t.project===proj && String(t.week)===week);
      total = tasks.length; done = tasks.filter(t=>state.done[taskId(t,false)]).length;
      cls = proj==='Incident Intelligence'?'p1':'p2';
    }
    el.innerHTML = makeRing(done, total, cls);
  });
}

// ══ OVERVIEW ══════════════════════════════════════════════════════════════════
function refreshOverview() {
  const totalTasks = SD_DATA.length + PR_DATA.length;
  const doneCnt = Object.keys(state.done).length;
  const p1Tasks = PR_DATA.filter(t=>t.project==='Incident Intelligence');
  const p2Tasks = PR_DATA.filter(t=>t.project==='Dynamic Pricing Engine');
  const agentTasks = PR_DATA.filter(t=>t.isAgent);
  const p1Done = p1Tasks.filter(t=>state.done[taskId(t,false)]).length;
  const p2Done = p2Tasks.filter(t=>state.done[taskId(t,false)]).length;
  const agentDone = agentTasks.filter(t=>state.done[taskId(t,false)]).length;
  const sdDone = SD_DATA.filter(t=>state.done[taskId(t,true)]).length;

  const grid = document.getElementById('overview-grid');
  grid.innerHTML = [
    {cls:'cyan', icon:'⚡', num: doneCnt+'/'+totalTasks, label:'Total Tasks Completed', pct: Math.round(doneCnt/totalTasks*100)},
    {cls:'blue', icon:'🔵', num: p1Done+'/'+p1Tasks.length, label:'Incident Intelligence', pct: Math.round(p1Done/p1Tasks.length*100)},
    {cls:'green', icon:'🟢', num: p2Done+'/'+p2Tasks.length, label:'Dynamic Pricing Engine', pct: Math.round(p2Done/p2Tasks.length*100)},
    {cls:'purple', icon:'🤖', num: agentDone+'/'+agentTasks.length, label:'Agent Upgrade Tasks', pct: Math.round(agentDone/agentTasks.length*100)},
    {cls:'gold', icon:'🎓', num: sdDone+'/'+SD_DATA.length, label:'System Design Curriculum', pct: Math.round(sdDone/SD_DATA.length*100)},
    {cls:'gold', icon:'🏆', num: Object.keys(state.achievements).length+'/'+ACHIEVEMENTS.length, label:'Achievements Unlocked', pct: Math.round(Object.keys(state.achievements).length/ACHIEVEMENTS.length*100)},
  ].map(s => `<div class="stat-card ${s.cls}">
    <div class="stat-icon">${s.icon}</div>
    <div class="stat-num ${s.cls}">${s.num}</div>
    <div class="stat-label">${s.label}</div>
    <div class="stat-bar"><div class="stat-bar-fill" style="width:${s.pct}%;background:${s.cls==='blue'?'var(--p1)':s.cls==='green'?'var(--p2)':s.cls==='purple'?'var(--agent)':'var(--cyan)'}"></div></div>
  </div>`).join('');

  // achievements
  const achDiv = document.getElementById('overview-milestones');
  achDiv.innerHTML = `<div style="font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--text3);margin-bottom:12px">ACHIEVEMENTS</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">
  ${ACHIEVEMENTS.map(a => {
    const unlocked = state.achievements[a.id];
    return `<div style="background:var(--bg2);border:1px solid ${unlocked?'var(--gold)':'var(--border)'};border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center;opacity:${unlocked?1:0.4};transition:opacity 0.3s">
      <div style="font-size:28px">${a.icon}</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:${unlocked?'var(--gold)':'var(--text)'}">${a.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${a.desc}</div>
        <div style="font-size:10px;font-family:'Orbitron',monospace;color:${unlocked?'var(--gold)':'var(--text3)'};margin-top:4px">+${a.xp} XP</div>
      </div>
    </div>`;
  }).join('')}
  </div>`;
}

// ══ RENDER PROJECTS ═══════════════════════════════════════════════════════════
let activeProjFilter = 'all';
let activePrWeek = 'all';

function filterProject(f, btn) {
  activeProjFilter = f;
  document.querySelectorAll('.proj-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

function filterPrWeek(w, btn) {
  activePrWeek = w;
  document.querySelectorAll('#pr-week-filters .wf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

function renderPrWeekFilters() {
  const weeks = [...new Set(PR_DATA.map(t=>t.week))].sort((a,b)=>a-b);
  const container = document.getElementById('pr-week-filters');
  container.innerHTML = `<span class="week-filters-label">WEEK</span>
    <button class="wf-btn all active" onclick="filterPrWeek('all',this)">ALL</button>
    ${weeks.map(w=>`<button class="wf-btn" onclick="filterPrWeek(${w},this)">W${w}</button>`).join('')}`;
}

function renderProjects() {
  let tasks = PR_DATA;
  if (activeProjFilter==='p1') tasks = tasks.filter(t=>t.project==='Incident Intelligence');
  if (activeProjFilter==='p2') tasks = tasks.filter(t=>t.project==='Dynamic Pricing Engine');
  if (activePrWeek!=='all') tasks = tasks.filter(t=>t.week===activePrWeek);

  if (!tasks.length) {
    document.getElementById('project-tasks').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No tasks found</p></div>';
    return;
  }

  // group by milestone
  const groups = {};
  for (const t of tasks) {
    const key = t.project + '~~' + t.milestone;
    if (!groups[key]) groups[key] = {project:t.project, milestone:t.milestone, tasks:[]};
    groups[key].tasks.push(t);
  }

  let html = '';
  for (const [key, g] of Object.entries(groups)) {
    const isAgent = g.milestone.includes('[AGENT]') || g.milestone.includes('[NEW]');
    const isP1 = g.project === 'Incident Intelligence';
    const cls = isAgent ? 'agent' : isP1 ? 'p1' : 'p2';
    const badgeCls = isAgent ? 'agent' : isP1 ? 'p1' : 'p2';
    const doneTasks = g.tasks.filter(t=>state.done[taskId(t,false)]).length;
    const milestoneIcons = {'Distributed Systems Foundations':'🏗️','Kafka Deep Dive':'📨','Log Ingestion':'📥','Aggregation Engine':'⚙️','Statistical Anomaly Detection':'📊','Isolation Forest':'🌲','Service Dependency Graph':'🕸️','Root Cause Engine':'🔍','Vector Similarity':'🧬','Hybrid Reasoning Engine':'🧠','Productionization':'🚀','Finalization':'🏁','ML Foundations':'📐','Data Simulation':'🎲','Forecasting Engine':'📈','LSTM Forecasting':'🔄','RL Foundations':'🎮','Tabular Q-Learning':'📋','Deep Q Network':'🤖','A/B Testing':'⚗️','Causal Inference':'🔬','Drift Detection':'📡','Auto Retraining':'🔁'};
    const icon = milestoneIcons[g.milestone.replace('[AGENT] ','').replace('[NEW] ','')] || (isAgent?'🤖':'📌');

    html += `<div class="milestone-group">
      <div class="milestone-header ${cls}" onclick="toggleMilestone(this)">
        <div class="milestone-icon">${icon}</div>
        <div class="milestone-title">${g.milestone}</div>
        <div class="milestone-meta">
          <span class="m-badge ${badgeCls}">${isP1?'P1':'P2'}</span>
          ${isAgent?'<span class="m-badge agent">AGENT</span>':''}
          <span class="m-badge wk">${doneTasks}/${g.tasks.length}</span>
        </div>
        <div class="milestone-progress-ring" data-ring="milestone|${key}">${makeRing(doneTasks,g.tasks.length,cls)}</div>
        <div class="chevron">▾</div>
      </div>
      <div class="milestone-tasks">
        ${g.tasks.map(t => renderTaskCard(t, false)).join('')}
      </div>
    </div>`;
  }
  document.getElementById('project-tasks').innerHTML = html;
}

function renderTaskCard(t, isSd) {
  const id = taskId(t, isSd);
  const done = !!state.done[id];
  const xpVal = getTaskXP(t, isSd);
  const isWkd = isSd ? (t.fmt&&t.fmt.includes('Weekend')) : t.isWeekend;
  const dayLabel = isSd ? (isWkd?'WEEKEND':'WEEKDAY') : t.day;
  const dayTagCls = isWkd ? 'wkd' : 'wd';
  const extraCls = (done?'done':'') + (isWkd?' weekend':'') + (!isSd&&t.isAgent?' agent-task':'');

  let subHtml = '';
  if (!isSd && t.deliverable && t.deliverable !== 'nan') {
    subHtml += `<span class="task-deliverable">${t.deliverable}</span>`;
  }
  if (!isSd && t.tech && t.tech !== 'nan') {
    const techs = t.tech.split(',').slice(0,3);
    subHtml += techs.map(tc => `<span class="tech-tag">${tc.trim()}</span>`).join('');
  }
  if (isSd && t.yt && t.yt !== 'nan') {
    subHtml += `<span class="yt-tag">${t.yt.slice(0,50)}${t.yt.length>50?'…':''}</span>`;
  }
  if (isSd && t.notes && t.notes !== 'nan') {
    subHtml += `<span class="notes-preview">${t.notes.slice(0,80)}${t.notes.length>80?'…':''}</span>`;
  }

  const encodedId = id.replace(/'/g,"\\'");

  return `<div class="task-card ${extraCls}" id="card_${CSS.escape(id)}">
    <div class="task-check-col" onclick="handleToggle('${encodedId}',${xpVal},${isSd},event)">
      <div class="task-checkbox ${done?'checked':''}" id="chk_${CSS.escape(id)}">${done?'✓':''}</div>
    </div>
    <div class="task-body">
      <div class="task-top">
        <span class="day-tag ${dayTagCls}">${dayLabel}</span>
        <span class="task-main-text">${isSd ? t.concept : t.task}</span>
      </div>
      ${subHtml ? `<div class="task-sub">${subHtml}</div>` : ''}
    </div>
    <div class="task-xp-col">
      <div class="xp-chip ${done?'earned':''}">+${xpVal}</div>
      <div style="font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace">XP</div>
    </div>
  </div>`;
}

function handleToggle(id, xpVal, isSd, event) {
  const checkEl = document.getElementById('chk_' + CSS.escape(id));
  const cardEl = document.getElementById('card_' + CSS.escape(id));
  if (!checkEl || !cardEl) return;
  toggleTask(id, xpVal, checkEl, cardEl, isSd);
}

function toggleMilestone(header) {
  header.classList.toggle('collapsed');
}

// ══ RENDER SYSTEM DESIGN ══════════════════════════════════════════════════════
let activeSdWeek = 'all';

function filterSdWeek(w, btn) {
  activeSdWeek = w;
  document.querySelectorAll('#sd-week-filters .wf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSysDesign();
}

function renderSdWeekFilters() {
  const weeks = [...new Set(SD_DATA.map(t=>t.week))].sort((a,b)=>a-b);
  const container = document.getElementById('sd-week-filters');
  container.innerHTML = `<span class="week-filters-label">WEEK</span>
    <button class="wf-btn all active" onclick="filterSdWeek('all',this)">ALL</button>
    ${weeks.map(w=>`<button class="wf-btn" onclick="filterSdWeek(${w},this)">W${w}</button>`).join('')}`;
}

function renderSysDesign() {
  let tasks = SD_DATA;
  if (activeSdWeek !== 'all') tasks = tasks.filter(t => t.week === activeSdWeek);

  const phases = {};
  for (const t of tasks) {
    const phase = t.phase.includes('Phase') ? t.phase : 'Phase 1 · Distributed Systems Core';
    if (!phases[phase]) phases[phase] = [];
    phases[phase].push(t);
  }

  const phaseColors = {
    'Phase 1': 'var(--p1)', 'Phase 2': 'var(--orange)',
    'Phase 3': 'var(--agent)', 'Phase 4': 'var(--gold)'
  };
  const phaseDescs = {
    'Phase 1 · Distributed Systems Core': 'CAP theorem, replication, Kafka, caching, databases',
    'Phase 2 · Scalability & Performance': 'Scaling patterns, vector DBs, observability, capacity',
    'Phase 3 · AI Systems Design': 'ML systems, RAG, agents, MLOps, RL architecture',
    'Phase 4 · Review & Deep Practice': 'Deep dives, mock interviews, system synthesis',
  };

  let html = '';
  for (const [phase, ptasks] of Object.entries(phases)) {
    const phaseNum = phase.match(/Phase (\d)/)?.[1] || '1';
    const color = phaseColors['Phase '+phaseNum] || 'var(--cyan)';
    const doneCnt = ptasks.filter(t=>state.done[taskId(t,true)]).length;

    html += `<div class="phase-banner" style="border-left-color:${color}">
      <div class="phase-num">${phaseNum}</div>
      <div class="phase-info">
        <h3>${phase}</h3>
        <p>${phaseDescs[phase]||''}</p>
      </div>
      <div class="phase-prog">
        <div class="phase-prog-num" style="color:${color}">${doneCnt}/${ptasks.length}</div>
        <div class="phase-prog-label">COMPLETED</div>
      </div>
    </div>`;

    html += `<div class="milestone-group">
      <div class="milestone-header sd" onclick="toggleMilestone(this)">
        <div class="milestone-icon">📚</div>
        <div class="milestone-title">${phase}</div>
        <div class="milestone-meta">
          <span class="m-badge sd">SYS DESIGN</span>
          <span class="m-badge wk">${doneCnt}/${ptasks.length}</span>
        </div>
        <div class="milestone-progress-ring" data-ring="sdphase|${phase}">${makeRing(doneCnt,ptasks.length,'sd')}</div>
        <div class="chevron">▾</div>
      </div>
      <div class="milestone-tasks">
        ${ptasks.map(t => renderTaskCard(t, true)).join('')}
      </div>
    </div><br>`;
  }
  document.getElementById('sd-tasks').innerHTML = html;
}

// ══ TABS ══════════════════════════════════════════════════════════════════════
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
});

// ══ INIT ══════════════════════════════════════════════════════════════════════
function init() {
  loadState();

  // seed any "done" from original data
  for (const t of SD_DATA) { if (t.done && !state.done[taskId(t,true)]) { /* don't auto-seed, let user control */ } }

  renderPrWeekFilters();
  renderSdWeekFilters();
  renderProjects();
  renderSysDesign();
  refreshOverview();
  updateHUD();

  // check existing achievements on load
  for (const a of ACHIEVEMENTS) {
    if (!state.achievements[a.id] && a.check(state)) {
      state.achievements[a.id] = true;
    }
  }
  updateHUD();
  saveState();
}

init();
</script>
